<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anniversary Dream Hall</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --male: #4A90D9;
            --female: #E91E8C;
            --bg: #FFF0F5;
            --gold: #D4A853;
            --dark-bg: #2a1020;
            --accent: #D4607A;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: "Trebuchet MS", "Gill Sans", sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #FFFFFF 100%);
            color: #333;
            scroll-behavior: smooth;
        }

        /* ============ FLOATING HEARTS ============ */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            opacity: 0.4;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                opacity: 0.4;
                transform: translateY(0) translateX(0) rotate(0deg);
            }
            50% {
                opacity: 0.6;
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) translateX(100px) rotate(360deg);
            }
        }

        /* ============ MAIN CONTENT WRAPPER ============ */
        .content {
            position: relative;
            z-index: 1;
        }

        /* ============ HERO SECTION ============ */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            animation: fadeIn 1.2s ease-out;
        }

        .ornament {
            font-size: 1.2rem;
            letter-spacing: 0.5em;
            color: var(--gold);
            margin-bottom: 2rem;
            animation: fadeIn 1.5s ease-out 0.3s both;
        }

        .names {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            animation: nameReveal 1s ease-out 0.6s both;
        }

        .name-male, .name-female {
            font-family: "Palatino Linotype", Palatino, Georgia, serif;
            font-size: clamp(2rem, 7vw, 4.5rem);
            font-weight: 700;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .name-male {
            background: linear-gradient(135deg, var(--male) 0%, #6B7FB3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .name-female {
            background: linear-gradient(135deg, var(--female) 0%, #C71E70 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .heart-separator {
            font-size: 2rem;
            animation: heartbeat 1.4s ease-in-out infinite;
            color: var(--gold);
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.15); }
            50% { transform: scale(1); }
        }

        .since-date {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #666;
            margin-bottom: 1.5rem;
            animation: fadeIn 1s ease-out 0.9s both;
        }

        .dream-message {
            font-size: clamp(1rem, 2vw, 1.3rem);
            font-style: italic;
            color: #555;
            max-width: 500px;
            margin-bottom: 3rem;
            line-height: 1.6;
            animation: fadeIn 1s ease-out 1.2s both;
        }

        .scroll-hint {
            margin-top: 3rem;
            animation: bounce 2s ease-in-out infinite;
        }

        .scroll-hint-arrow {
            font-size: 1.5rem;
            color: var(--gold);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(8px); }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes nameReveal {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ COUNTDOWN SECTION ============ */
        .countdown-section {
            padding: 4rem 2rem;
            background: rgba(255, 240, 245, 0.7);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        .countdown-title {
            font-family: "Palatino Linotype", Palatino, Georgia, serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: var(--female);
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .countdown-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 2px solid var(--gold);
            border-radius: 8px;
            width: clamp(55px, 12vw, 80px);
            height: clamp(60px, 14vw, 90px);
            padding: 0.5rem;
        }

        .countdown-number {
            font-family: 'Courier New', monospace;
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-weight: 700;
            color: var(--male);
            line-height: 1;
            min-height: 1.5em;
            overflow: hidden;
        }

        .countdown-label {
            font-size: clamp(0.65rem, 1.5vw, 0.8rem);
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0.3rem;
        }

        .countdown-separator {
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            color: var(--gold);
            margin: 0 0.25rem;
            line-height: 1;
        }

        .countdown-message {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: #555;
            margin-top: 1.5rem;
        }

        /* ============ DREAM HALL SECTION ============ */
        .dream-hall-section {
            padding: 4rem 2rem;
            background: linear-gradient(180deg, rgba(255, 240, 245, 0.5) 0%, rgba(255, 255, 255, 0.8) 100%);
            text-align: center;
        }

        .dream-hall-title {
            font-family: "Palatino Linotype", Palatino, Georgia, serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: var(--male);
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .hall-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 3rem;
        }

        #buildingCanvas {
            display: block;
            width: 100%;
            max-width: 580px;
            aspect-ratio: 580 / 430;
            border-radius: 20px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.14);
            cursor: grab;
        }
        #buildingCanvas:active { cursor: grabbing; }

        .sparkle-overlay {
            position: absolute;
            font-size: 1.5rem;
            animation: sparkle 2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes sparkle {
            0%, 100% {
                opacity: 0;
                transform: scale(0.8) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: scale(1.2) rotate(180deg);
            }
        }

        .progress-info {
            margin-bottom: 1.5rem;
            font-size: clamp(0.9rem, 2vw, 1rem);
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .progress-bar {
            width: 100%;
            max-width: 400px;
            height: 8px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 4px;
            margin: 0 auto 1rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--male) 0%, var(--female) 100%);
            border-radius: 4px;
            width: 0%;
            transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .stage-description {
            font-size: 1rem;
            color: #666;
            font-style: italic;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* ============ TIMELINE SECTION ============ */
        .timeline-section {
            padding: 4rem 2rem;
            background: rgba(255, 255, 255, 0.9);
        }

        .timeline-title {
            font-family: "Palatino Linotype", Palatino, Georgia, serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: var(--female);
            margin-bottom: 3rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .timeline {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            padding-left: 2rem;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, var(--male) 0%, var(--female) 100%);
            border-radius: 2px;
        }

        .timeline-item {
            margin-bottom: 2.5rem;
            padding-left: 2rem;
            animation: slideInLeft 0.6s ease-out both;
            opacity: 0;
        }

        .timeline-item:nth-child(1) { animation-delay: 0.1s; }
        .timeline-item:nth-child(2) { animation-delay: 0.2s; }
        .timeline-item:nth-child(3) { animation-delay: 0.3s; }
        .timeline-item:nth-child(4) { animation-delay: 0.4s; }
        .timeline-item:nth-child(5) { animation-delay: 0.5s; }
        .timeline-item:nth-child(6) { animation-delay: 0.6s; }

        .timeline-item.visible {
            animation: slideInLeft 0.6s ease-out forwards;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .timeline-dot {
            position: absolute;
            left: -1.35rem;
            top: 0;
            width: 18px;
            height: 18px;
            background: white;
            border: 3px solid var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
        }

        .timeline-date {
            font-weight: 600;
            color: var(--male);
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.3rem;
        }

        .timeline-label {
            color: #555;
            font-size: 1rem;
            line-height: 1.5;
        }

        .timeline-coming {
            background: linear-gradient(135deg, rgba(74, 144, 217, 0.1) 0%, rgba(233, 30, 140, 0.1) 100%);
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid var(--female);
        }

        .timeline-coming-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--female);
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .timeline-empty {
            text-align: center;
            color: #999;
            font-style: italic;
            padding: 2rem;
        }

        /* ============ FOOTER ============ */
        .footer {
            padding: 3rem 2rem;
            background: linear-gradient(180deg, rgba(255, 240, 245, 0.8) 0%, rgba(212, 96, 122, 0.1) 100%);
            text-align: center;
            border-top: 2px solid var(--gold);
        }

        .footer-quote {
            font-size: clamp(1rem, 2vw, 1.3rem);
            font-style: italic;
            color: #555;
            margin-bottom: 1.5rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.8;
        }

        .footer-hearts {
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .footer-heart {
            font-size: 1.5rem;
            color: var(--female);
            animation: heartbeat 1.4s ease-in-out infinite;
        }

        .footer-heart:nth-child(2) {
            animation-delay: 0.2s;
        }

        .footer-heart:nth-child(3) {
            animation-delay: 0.4s;
        }

        /* ============ COUPLE PHOTO ============ */
        .couple-photo-wrap {
            margin: 1.2rem auto 1.6rem;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid var(--female);
            box-shadow: 0 0 0 6px rgba(233,30,140,0.12), 0 8px 28px rgba(0,0,0,0.14);
            display: none; /* shown by JS when photo exists */
        }
        .couple-photo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ============ GALLERY ============ */
        .gallery-section {
            padding: 3rem 1.5rem 2rem;
            text-align: center;
            display: none; /* shown by JS when photos exist */
        }
        .gallery-title {
            font-size: clamp(1.4rem, 4vw, 1.9rem);
            font-weight: 800;
            color: var(--female);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .gallery-subtitle {
            font-size: 0.9rem;
            color: #a07888;
            margin-bottom: 2rem;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.4rem;
            max-width: 900px;
            margin: 0 auto;
        }
        .gallery-card {
            background: #fff;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 18px rgba(180,60,120,0.10), 0 1px 4px rgba(0,0,0,0.07);
            transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), box-shadow 0.25s;
            cursor: pointer;
        }
        .gallery-card:hover {
            transform: translateY(-6px) rotate(1.5deg);
            box-shadow: 0 12px 36px rgba(180,60,120,0.18);
        }
        .gallery-card:nth-child(even):hover {
            transform: translateY(-6px) rotate(-1.5deg);
        }
        .gallery-img-wrap {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #fce8f3;
        }
        .gallery-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.35s ease;
        }
        .gallery-card:hover .gallery-img-wrap img {
            transform: scale(1.08);
        }
        .gallery-label {
            padding: 0.6rem 0.75rem 0.7rem;
            font-size: 0.82rem;
            color: #7a4060;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-style: italic;
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 640px) {
            .names {
                gap: 0.5rem;
            }

            .heart-separator {
                font-size: 1.5rem;
            }

            .countdown-separator {
                margin: 0 0.1rem;
            }

            .timeline {
                padding-left: 1.5rem;
            }

            .timeline-dot {
                left: -1.05rem;
                width: 16px;
                height: 16px;
                border-width: 2px;
                font-size: 0.8rem;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>
<body>
<script>
window.TEMPLATE_CONFIG = {
  maleName: "{{config.maleName}}",
  femaleName: "{{config.femaleName}}",
  maleColor: "{{config.maleColor}}",
  femaleColor: "{{config.femaleColor}}",
  coupleStartDate: "{{config.coupleStartDate}}",
  nextAnniversaryDate: "{{config.nextAnniversaryDate}}",
  nextAnniversaryLabel: "{{config.nextAnniversaryLabel}}",
  milestoneCount: {{config.milestoneCount}},
  anniversaries: [
    {date:"{{config.anniversary1Date}}",label:"{{config.anniversary1Label}}"},
    {date:"{{config.anniversary2Date}}",label:"{{config.anniversary2Label}}"},
    {date:"{{config.anniversary3Date}}",label:"{{config.anniversary3Label}}"},
    {date:"{{config.anniversary4Date}}",label:"{{config.anniversary4Label}}"},
    {date:"{{config.anniversary5Date}}",label:"{{config.anniversary5Label}}"}
  ].filter(a => a.date && !a.date.includes('{')),
  dreamMessage: "{{config.dreamMessage}}",
  primaryBg: "{{config.primaryBg}}",
  couplePhoto: "{{config.couplePhoto}}",
  photo1: "{{config.photo1}}",
  photo1Label: "{{config.photo1Label}}",
  photo2: "{{config.photo2}}",
  photo2Label: "{{config.photo2Label}}",
  photo3: "{{config.photo3}}",
  photo3Label: "{{config.photo3Label}}",
  photo4: "{{config.photo4}}",
  photo4Label: "{{config.photo4Label}}",
  photo5: "{{config.photo5}}",
  photo5Label: "{{config.photo5Label}}"
};
</script>

<div class="floating-hearts" id="floatingHearts"></div>

<div class="content">
    <!-- HERO SECTION -->
    <section class="hero">
        <div class="ornament">✦   ✦   ✦</div>
        <div class="names">
            <span class="name-male" id="maleName"></span>

    <!-- COUNTDOWN SECTION -->
    <section class="countdown-section">

        <div class="countdown-container">
            <div class="countdown-card">
                <div class="countdown-number" id="daysNum">0</div>
                <div class="countdown-label">Ngày</div>
            </div>

            <div class="countdown-card">
                <div class="countdown-number" id="minutesNum">0</div>
                <div class="countdown-label">Phút</div>
            </div>
            <div class="countdown-separator">:</div>
            <div class="countdown-card">
                <div class="countdown-number" id="secondsNum">0</div>
                <div class="countdown-label">Giây</div>
            </div>
        </div>
        <div class="countdown-message" id="countdownMessage"></div>
    </section>

    <!-- GALLERY SECTION -->
    <section class="gallery-section" id="gallerySection">
        <h2 class="gallery-title">Kỷ Niệm Của Chúng Ta 💕</h2>

    <!-- DREAM HALL SECTION -->
    <section class="dream-hall-section">
        <h2 class="dream-hall-title">Lễ Đường Trong Mơ</h2>
        <div class="hall-container">
            <canvas id="buildingCanvas" width="580" height="430"></canvas>
            <div id="sparkles"></div>
        </div>
        <div class="progress-info" id="progressInfo">Hành trình: 0 / 10 cột mốc</div>

    <section class="timeline-section">

    </section>

    <!-- FOOTER -->
    <section class="footer">
        <div class="footer-quote" id="footerQuote"></div>
        <div class="footer-hearts">
            <span class="footer-heart">♥</span>

            <span class="footer-heart">♥</span>
        </div>
    </section>
</div>

<script>
// ============ UTILITY FUNCTIONS ============
function formatDate(dateStr) {
    const date = new Date(dateStr);
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const year = date.getFullYear();
    return `${day}-${month}-${year}`;
}

function getTimeUntil(targetDate) {
    const now = new Date();
    const target = new Date(targetDate);
    const diff = target - now;

    if (diff <= 0) {
        return { days: 0, hours: 0, minutes: 0, seconds: 0 };
    }

    return {
        days: Math.floor(diff / (1000 * 60 * 60 * 24)),
        hours: Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)),
        minutes: Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)),
        seconds: Math.floor((diff % (1000 * 60)) / 1000)
    };
}

// ============ INITIALIZE CSS VARIABLES ============
function initializeCssVariables() {
    const config = window.TEMPLATE_CONFIG;
    document.documentElement.style.setProperty('--male', config.maleColor);
    document.documentElement.style.setProperty('--female', config.femaleColor);
    document.documentElement.style.setProperty('--bg', config.primaryBg);
}

// ============ CREATE FLOATING HEARTS ============
function createFloatingHearts() {
    const container = document.getElementById('floatingHearts');
    const hearts = ['♥', '♡', '💕'];

    for (let i = 0; i < 20; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.textContent = hearts[i % hearts.length];

        const left = Math.random() * 100;
        const duration = 6 + Math.random() * 8;
        const delay = Math.random() * 2;
        const color = Math.random() > 0.5 ? 'var(--male)' : 'var(--female)';

        heart.style.left = left + '%';
        heart.style.color = color;
        heart.style.animationDuration = duration + 's';
        heart.style.animationDelay = delay + 's';

        container.appendChild(heart);
    }
}

// ============ POPULATE HERO SECTION ============
function populateHeroSection() {
    const config = window.TEMPLATE_CONFIG;
    document.getElementById('maleName').textContent = config.maleName;
    document.getElementById('femaleName').textContent = config.femaleName;
    document.getElementById('sinceDate').textContent = `Từ ngày ${formatDate(config.coupleStartDate)}`;
    document.getElementById('dreamMessage').textContent = config.dreamMessage;
    document.getElementById('footerQuote').textContent = config.dreamMessage;
}

// ============ COUNTDOWN TIMER ============
function updateCountdown() {
    const config = window.TEMPLATE_CONFIG;
    const time = getTimeUntil(config.nextAnniversaryDate);

    document.getElementById('daysNum').textContent = String(time.days).padStart(2, '0');
    document.getElementById('hoursNum').textContent = String(time.hours).padStart(2, '0');
    document.getElementById('minutesNum').textContent = String(time.minutes).padStart(2, '0');
    document.getElementById('secondsNum').textContent = String(time.seconds).padStart(2, '0');

    const daysRemaining = time.days;
    document.getElementById('countdownMessage').textContent =
        `Còn ${daysRemaining} ngày nữa đến ${config.nextAnniversaryLabel}`;
}

// ============ THREE.JS DREAM HALL ============
let _hall = null; // { scene, camera, renderer, animId }

function renderBuilding() {
  try {
    const cfg = window.TEMPLATE_CONFIG;
    const fc  = (cfg.femaleColor || '#E91E8C').trim();
    const mc  = (cfg.maleColor   || '#4A90D9').trim();
    const cv  = document.getElementById('buildingCanvas');
    if (!cv) return;
    if (typeof THREE === 'undefined') {
        cv.style.background = 'linear-gradient(135deg,#FFF0F5,#FFE4F0)';
        cv.style.borderRadius = '20px';
        return;
    }

    // ── Stop any existing animation loop ──────────────────────
    if (_hall && _hall.animId) { cancelAnimationFrame(_hall.animId); _hall.animId = null; }

    // ── Init renderer & camera once ───────────────────────────
    if (!_hall) {
        const W = 580, H = 430;
        const scene  = new THREE.Scene();
        // Gradient sky: rose-pink top → warm cream bottom
        const _skyC = document.createElement('canvas');
        _skyC.width = 4; _skyC.height = 512;
        const _skyX = _skyC.getContext('2d');
        const _skyG = _skyX.createLinearGradient(0, 0, 0, 512);
        _skyG.addColorStop(0,    '#F2C0E4');
        _skyG.addColorStop(0.35, '#FAD8F0');
        _skyG.addColorStop(0.75, '#FEF0F8');
        _skyG.addColorStop(1,    '#FFF8FC');
        _skyX.fillStyle = _skyG; _skyX.fillRect(0, 0, 4, 512);
        scene.background = new THREE.CanvasTexture(_skyC);

        const aspect = W / H;
        const frust  = 10.8;
        const camera = new THREE.OrthographicCamera(
            -frust * aspect / 2,  frust * aspect / 2,
             frust / 2,          -frust / 2,
            0.1, 300
        );
        camera.position.set(14, 10, 14);
        camera.lookAt(new THREE.Vector3(0, 2.5, 0));
        camera.updateProjectionMatrix();

        const renderer = new THREE.WebGLRenderer({ canvas: cv, antialias: true });
        renderer.setSize(W, H, false);  // false = don't update CSS; canvas attrs set to 580×430
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type    = THREE.PCFSoftShadowMap;
        _hall = { scene, camera, renderer, animId: null };
    }

    const { scene, camera, renderer } = _hall;

    // ── Dispose + clear scene ─────────────────────────────────
    scene.children.slice().forEach(obj => {
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
            (Array.isArray(obj.material) ? obj.material : [obj.material])
                .forEach(m => m.dispose());
        }
        scene.remove(obj);
    });

    // ── Color helpers ─────────────────────────────────────────
    const WHITE3 = new THREE.Color(1, 1, 1);
    function lC(hex, t) { return new THREE.Color(hex).lerp(WHITE3, t); }

    // Building palette — all derived from femaleColor
    const Cwall  = lC(fc, 0.56);
    const Ccol   = lC(fc, 0.82);
    const Cent   = lC(fc, 0.48);
    const Cped   = lC(fc, 0.36);
    const CroofL = lC(fc, 0.30);
    const CroofR = lC(fc, 0.16);
    const Cstep  = lC(fc, 0.74);
    const Cband  = lC(fc, 0.44);

    const Cdoor   = new THREE.Color(0x380E1C);
    const Cwin    = new THREE.Color(0xFFE070);
    const Cgrass  = new THREE.Color(0x88B836);
    const Ctrunk  = new THREE.Color(0x7A3C10);
    const Ctree   = new THREE.Color(0xCC5510);
    const CtreeLt = new THREE.Color(0xE07030);
    const CtreeDk = new THREE.Color(0xAA3808);
    const Cfount  = new THREE.Color(0x78D0F0);

    // ── Material factory ──────────────────────────────────────
    function M(col, shine, em, emI) {
        shine = shine || 8;
        const p = { color: col, shininess: shine, specular: new THREE.Color(0x1A1010) };
        if (em) { p.emissive = em; p.emissiveIntensity = emI || 0; }
        return new THREE.MeshPhongMaterial(p);
    }

    // ── Mesh primitives ───────────────────────────────────────
    function addBox(w, h, d, col, x, y, z, shine) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), M(col, shine));
        m.position.set(x, y, z);
        m.castShadow = m.receiveShadow = true;
        scene.add(m); return m;
    }
    function addCyl(rT, rB, h, segs, col, x, y, z, shine) {
        const m = new THREE.Mesh(new THREE.CylinderGeometry(rT, rB, h, segs || 10), M(col, shine || 10));
        m.position.set(x, y, z);
        m.castShadow = m.receiveShadow = true;
        scene.add(m); return m;
    }
    function addSph(r, col, x, y, z, shine, em, emI) {
        const m = new THREE.Mesh(new THREE.SphereGeometry(r, 12, 10), M(col, shine, em, emI));
        m.position.set(x, y, z);
        m.castShadow = true;
        scene.add(m); return m;
    }
    function addTri(v, col) {
        const g = new THREE.BufferGeometry();
        g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(v), 3));
        g.computeVertexNormals();
        const m = new THREE.Mesh(g, M(col, 5));
        m.castShadow = true; scene.add(m); return m;
    }
    function addQuad(a, b, c, d, col) {
        addTri([...a,...b,...c], col);
        addTri([...a,...c,...d], col);
    }

    // ── LIGHTS ────────────────────────────────────────────────
    scene.add(new THREE.AmbientLight(0xffe8f5, 0.70)); // warm rose ambient

    const sun = new THREE.DirectionalLight(0xfff0e0, 1.55);
    sun.position.set(16, 24, 14);
    sun.castShadow = true;
    sun.shadow.camera.left = sun.shadow.camera.bottom = -14;
    sun.shadow.camera.right = sun.shadow.camera.top   =  14;
    sun.shadow.mapSize.setScalar(1024);
    scene.add(sun);

    // Cool sky fill from front-left
    const fill = new THREE.DirectionalLight(0xd0e8ff, 0.25);
    fill.position.set(-12, 6, 16);
    scene.add(fill);

    // Pink bounce — glows from below to give the building a magical lift
    const bounce = new THREE.DirectionalLight(0xffcce8, 0.35);
    bounce.position.set(0, -8, 12);
    scene.add(bounce);

    // Gold rim from behind — warm depth & luxury
    const rim = new THREE.DirectionalLight(0xffd080, 0.22);
    rim.position.set(-8, 5, -10);
    scene.add(rim);

    // ══ STAGE 0: Ground ══════════════════════════════════════
    const gnd = new THREE.Mesh(new THREE.BoxGeometry(28, 0.20, 24), M(Cgrass, 2));
    gnd.position.set(0, -0.10, 0.5);
    gnd.receiveShadow = true;
    scene.add(gnd);
    // Darker back strip (atmospheric depth)
    addBox(28, 0.02, 10, new THREE.Color(0x6A9A28), 0, 0.01, -5);

    if (cfg.milestoneCount === 0) {
        const hcs = [new THREE.Color(fc), new THREE.Color(mc)];
        for (let i = 0; i < 6; i++)
            addSph(0.18, hcs[i % 2], -2.5 + i, 3.0 + Math.sin(i * 1.4) * 0.5, 1.2,
                   22, hcs[i % 2], 0.42);
    }

    // ══ STAGE 1: Foundation (3 steps) ════════════════════════
    if (cfg.milestoneCount >= 1) {
        addBox(10.2, 0.28, 5.8,  Cstep,        0, 0.14, 0.10);
        addBox(9.2,  0.28, 4.9,  lC(fc, 0.68), 0, 0.42, 0.10);
        addBox(8.3,  0.36, 4.1,  lC(fc, 0.62), 0, 0.74, 0.10);
    }

    // ── Building geometry constants ───────────────────────────
    const baseY   = 0.92;
    const wallH   = 3.55;
    const topY    = baseY + wallH;      // 4.47
    const entH    = 0.60;
    const entTopY = topY + entH;        // 5.07
    const pedH    = 1.14;
    const ridgeY  = entTopY + pedH;     // 6.21

    // ══ STAGE 2: Walls + String Courses ══════════════════════
    if (cfg.milestoneCount >= 2) {
        const wY = baseY + wallH / 2;
        addBox(6.6, wallH, 0.54, Cwall,        0,    wY,  -1.68); // back
        addBox(0.54, wallH, 3.34, Cwall,       -3.70, wY,  -0.12); // left
        addBox(0.54, wallH, 3.34, Cwall,        3.70, wY,  -0.12); // right
        addBox(6.6, 0.54, 0.40, lC(fc, 0.53),  0, baseY + 0.27, 1.74); // front sill
        // Horizontal string courses
        addBox(7.7, 0.11, 3.84, Cband, 0, baseY + wallH * 0.38, -0.08);
        addBox(7.7, 0.11, 3.84, Cband, 0, baseY + wallH * 0.72, -0.08);
    }

    // ══ STAGE 3: Six Greek Columns ════════════════════════════
    if (cfg.milestoneCount >= 3) {
        const nC = 6, span = 6.5, colZ = 1.84;
        const cH = wallH;
        for (let i = 0; i < nC; i++) {
            const cx = -span / 2 + i * (span / (nC - 1));
            // Plinth (square base)
            addBox(0.54, 0.22, 0.54, lC(fc, 0.54), cx, baseY + 0.11, colZ, 8);
            // Shaft — tapered cylinder (classical entasis)
            addCyl(0.195, 0.245, cH - 0.38, 10, Ccol, cx,
                   baseY + 0.22 + (cH - 0.38) / 2, colZ, 15);
            // Capital (Doric abacus)
            addBox(0.56, 0.30, 0.56, lC(fc, 0.57), cx, topY - 0.15, colZ, 8);
        }
    }

    // ══ STAGE 4: Entablature + Arched Door ═══════════════════
    if (cfg.milestoneCount >= 4) {
        // Architrave (lowest)
        addBox(8.1, 0.22, 4.22, lC(fc, 0.52), 0, topY + 0.11, 0, 8);
        // Frieze
        addBox(7.9, 0.24, 4.08, Cent,          0, topY + 0.33, 0, 8);
        // Cornice (projects further)
        addBox(8.4, 0.22, 4.38, lC(fc, 0.44), 0, topY + 0.55, 0, 8);
        // Door (wine-dark)
        addBox(1.72, 2.30, 0.14, Cdoor,        0, baseY + 1.15, 1.85, 2);
        // Door arch top
        const archGeo = new THREE.BufferGeometry();
        const dz = 1.85, dy = baseY + 2.30;
        archGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
            -0.86, dy, dz,  0.86, dy, dz,  0, dy + 0.70, dz
        ]), 3));
        archGeo.computeVertexNormals();
        const archMesh = new THREE.Mesh(archGeo, M(Cdoor, 2));
        scene.add(archMesh);
    }

    // ══ STAGE 5: Pediment + Gable Roof ═══════════════════════
    if (cfg.milestoneCount >= 5) {
        const xL = -4.20, xR = 4.20, zF = 2.19, zB = -2.19;

        // Front pediment triangle face
        addTri([xL, entTopY, zF,  xR, entTopY, zF,  0, ridgeY, zF], Cped);
        // Back pediment face (darker, facing away)
        addTri([xL, entTopY, zB,  xR, entTopY, zB,  0, ridgeY, zB], lC(fc, 0.22));

        // Left roof slope (lighter, facing up-left)
        addQuad(
            [xL, entTopY, zB], [xL, entTopY, zF],
            [0,  ridgeY,  zF], [0,  ridgeY,  zB],
            CroofL
        );
        // Right roof slope (darker, facing right)
        addQuad(
            [0,  ridgeY,  zB], [0,  ridgeY,  zF],
            [xR, entTopY, zF], [xR, entTopY, zB],
            CroofR
        );

        // Ridge cap beam
        addBox(0.20, 0.18, 4.40, lC(fc, 0.14), 0, ridgeY + 0.09, 0, 5);
        // Apex acroterion sphere
        addSph(0.26, new THREE.Color(fc), 0, ridgeY + 0.34, 0,
               25, new THREE.Color(fc), 0.30);
        // Corner acroteria
        [[xL, zF], [xR, zF]].forEach(([ax, az]) =>
            addSph(0.16, new THREE.Color(fc), ax, entTopY + 0.14, az,
                   18, new THREE.Color(fc), 0.25)
        );
    }

    // ══ STAGE 6: Glowing Windows ═════════════════════════════
    if (cfg.milestoneCount >= 6) {
        [
            [-2.0, baseY + 0.85], [0, baseY + 0.85], [2.0, baseY + 0.85],
            [-2.0, baseY + 1.98], [0, baseY + 1.98], [2.0, baseY + 1.98],
        ].forEach(([wx, wy]) => {
            addBox(0.76, 0.58, 0.10, lC(fc, 0.42), wx, wy, -1.65, 8); // frame
            const glass = new THREE.Mesh(
                new THREE.BoxGeometry(0.60, 0.44, 0.12),
                M(Cwin, 50, Cwin, 0.72)
            );
            glass.position.set(wx, wy, -1.65);
            scene.add(glass);
        });
    }

    // ══ STAGE 7: Warm Orange Trees ════════════════════════════
    if (cfg.milestoneCount >= 7) {
        [[-6.3, -1.0], [6.3, -1.0], [-5.4, 1.6], [5.4, 1.6]].forEach(([tx, tz]) => {
            addCyl(0.18, 0.27, 1.60, 7,  Ctrunk,  tx,    0.80, tz, 3);   // trunk
            addSph(0.98, Ctree,          tx,    2.54, tz,  5);             // main foliage
            addSph(0.70, CtreeLt,        tx - 0.32, 3.14, tz + 0.22, 9); // lighter top
            addSph(0.76, CtreeDk,        tx + 0.22, 2.00, tz - 0.12, 3); // shadow base
        });
    }

    // ══ STAGE 8: Flower Garden ═══════════════════════════════
    if (cfg.milestoneCount >= 8) {
        const flC = [
            new THREE.Color(fc), new THREE.Color(mc),
            new THREE.Color(0xFFB0C0), new THREE.Color(0xFFD060)
        ];
        [
            [-3.2, 2.5], [-1.6, 2.6], [0, 2.5], [1.6, 2.6], [3.2, 2.5],
            [-2.7, -2.2], [0, -2.3], [2.7, -2.2]
        ].forEach(([fx, fz], i) => {
            addCyl(0.045, 0.045, 0.54, 5, new THREE.Color(0x50A030), fx, 0.27, fz, 2);
            addSph(0.21, flC[i % flC.length], fx, 0.56, fz, 20);
        });
    }

    // ══ STAGE 9: Fountain ════════════════════════════════════
    if (cfg.milestoneCount >= 9) {
        addCyl(1.48, 1.12, 0.38, 16, lC(fc, 0.62), 0, 0.19,  3.8, 20); // basin
        addCyl(1.30, 1.30, 0.10, 16, Cfount,        0, 0.42,  3.8, 48); // water
        addCyl(0.12, 0.18, 0.86, 8,  lC(fc, 0.46),  0, 0.70,  3.8, 10); // pillar
        addSph(0.25, new THREE.Color(fc), 0, 1.14, 3.8, 28, new THREE.Color(fc), 0.22);
    }

    // ── ✨ SPARKLE PARTICLES (all stages) ────────────────────
    const _sparks = [];
    const _sparkPalette = [
        new THREE.Color(0xFFD700),
        new THREE.Color(fc),
        new THREE.Color(0xFFB8D8),
        new THREE.Color(0xFFFFFF),
        new THREE.Color(0xFFA0C8),
        new THREE.Color(0xFFE080),
    ];
    for (let i = 0; i < 45; i++) {
        const r   = 0.03 + Math.random() * 0.06;
        const sc  = _sparkPalette[i % _sparkPalette.length];
        const mat = new THREE.MeshPhongMaterial({
            color: sc, emissive: sc, emissiveIntensity: 1.0, shininess: 80
        });
        const sp = new THREE.Mesh(new THREE.SphereGeometry(r, 6, 6), mat);
        const ang2 = Math.random() * Math.PI * 2;
        const dist = 2.0 + Math.random() * 5.0;
        const startY = 0.3 + Math.random() * 4.5;
        sp.position.set(
            Math.cos(ang2) * dist * (0.7 + Math.random() * 0.6),
            startY,
            Math.sin(ang2) * dist * 0.55
        );
        sp.userData.vy     = 0.008 + Math.random() * 0.016;
        sp.userData.startY = startY;
        sp.userData.maxY   = startY + 1.8 + Math.random() * 2.2;
        sp.userData.phase  = Math.random() * Math.PI * 2;
        scene.add(sp);
        _sparks.push(sp);
    }

    // ══ STAGE 10: Full Magic Dream Hall ══════════════════════
    if (cfg.milestoneCount >= 10) {
        const glow1 = new THREE.PointLight(new THREE.Color(fc), 1.8, 13);
        glow1.position.set(0, baseY + 1.8, 0.5);
        scene.add(glow1);
        const glow2 = new THREE.PointLight(0xFFE040, 1.1, 11);
        glow2.position.set(0, 4.5, 3.8);
        scene.add(glow2);
        const goldC = new THREE.Color(0xFFD700);
        [[-4.5, 6.8, 1.5], [4.5, 6.8, 1.5], [0, 8.0, 2.0], [-2.5, 6.0, -1.0], [2.5, 6.0, -1.0]]
            .forEach(([ox, oy, oz]) => addSph(0.24, goldC, ox, oy, oz, 60, goldC, 0.80));
    }

    // ── Render: gentle orbit for stage 10, static otherwise ──
    if (cfg.milestoneCount >= 10) {
        let ang = Math.PI / 4;
        function animate() {
            ang += 0.005; // slower, more graceful orbit
            camera.position.x = Math.cos(ang) * 14;
            camera.position.z = Math.sin(ang) * 14;
            camera.position.y = 10;
            camera.lookAt(0, 2.5, 0);
            camera.updateMatrixWorld();

            // ✨ Animate sparkle particles
            const t = performance.now() * 0.001;
            _sparks.forEach((s, i) => {
                s.position.y += s.userData.vy;
                if (s.position.y > s.userData.maxY) s.position.y = s.userData.startY;
                const pulse = 0.7 + 0.5 * Math.sin(t * 3 + s.userData.phase);
                s.scale.setScalar(pulse);
                s.position.x += Math.sin(t * 0.9 + i * 0.6) * 0.002;
                s.position.z += Math.cos(t * 0.9 + i * 0.6) * 0.0015;
            });

            renderer.render(scene, camera);
            _hall.animId = requestAnimationFrame(animate);
        }
        animate();
    } else {
        renderer.render(scene, camera);
    }
  } catch(e) {
    console.error('[DreamHall] renderBuilding error:', e);
  }
}

// ============ UPDATE PROGRESS ============
function updateProgress() {
    const config = window.TEMPLATE_CONFIG;
    const percent = (Math.min(config.milestoneCount, 10) / 10) * 100;

    document.getElementById('progressInfo').textContent =
        `Hành trình: ${config.milestoneCount} / 10 cột mốc`;

    const progressFill = document.getElementById('progressFill');
    setTimeout(() => {
        progressFill.style.width = percent + '%';
    }, 100);

    const stageIdx = Math.min(config.milestoneCount, 10);
    document.getElementById('stageDescription').textContent = stageDescriptions[stageIdx];
}

// ============ BUILD TIMELINE ============
function buildTimeline() {
    const config = window.TEMPLATE_CONFIG;
    const timelineContainer = document.getElementById('timeline');

    if (config.anniversaries.length === 0) {
        timelineContainer.innerHTML = '<div class="timeline-empty">Những cột mốc yêu thương sẽ hiện ra ở đây...</div>';
        return;
    }

    const icons = ['💕', '⭐', '💍', '🌸', '🎊', '✨'];

    config.anniversaries.forEach((anniversary, idx) => {
        if (!anniversary.date) return;

        const item = document.createElement('div');
        item.className = 'timeline-item';

        const dot = document.createElement('div');
        dot.className = 'timeline-dot';
        dot.textContent = icons[idx % icons.length];

        const date = document.createElement('div');
        date.className = 'timeline-date';
        date.textContent = formatDate(anniversary.date);

        const label = document.createElement('div');
        label.className = 'timeline-label';
        label.textContent = anniversary.label;

        item.appendChild(dot);
        item.appendChild(date);
        item.appendChild(label);

        timelineContainer.appendChild(item);
    });

    // Add upcoming milestone
    const nextItem = document.createElement('div');
    nextItem.className = 'timeline-item timeline-coming';

    const nextLabel = document.createElement('div');
    nextLabel.className = 'timeline-coming-label';
    nextLabel.textContent = 'Sắp đến';

    const nextDate = document.createElement('div');
    nextDate.className = 'timeline-date';
    nextDate.textContent = formatDate(config.nextAnniversaryDate);

    const nextDesc = document.createElement('div');
    nextDesc.className = 'timeline-label';
    nextDesc.textContent = config.nextAnniversaryLabel;

    nextItem.appendChild(nextLabel);
    nextItem.appendChild(nextDate);
    nextItem.appendChild(nextDesc);

    timelineContainer.appendChild(nextItem);

    // Trigger animation on scroll
    observeTimelineItems();
}

// ============ INTERSECTION OBSERVER FOR TIMELINE ============
function observeTimelineItems() {
    const items = document.querySelectorAll('.timeline-item');

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.1 });

    items.forEach(item => observer.observe(item));
}

// ============ COUPLE PHOTO ============
function initCouplePhoto() {
    const cfg = window.TEMPLATE_CONFIG;
    const url = cfg.couplePhoto;
    if (!url || url.includes('{')) return;
    const wrap = document.getElementById('couplePhotoWrap');
    const img  = document.getElementById('couplePhotoImg');
    if (wrap && img) {
        img.src = url;
        wrap.style.display = 'block';
    }
}

// ============ PHOTO GALLERY ============
function buildGallery() {
    const cfg = window.TEMPLATE_CONFIG;
    const photos = [
        { url: cfg.photo1, label: cfg.photo1Label },
        { url: cfg.photo2, label: cfg.photo2Label },
        { url: cfg.photo3, label: cfg.photo3Label },
        { url: cfg.photo4, label: cfg.photo4Label },
        { url: cfg.photo5, label: cfg.photo5Label },
    ].filter(p => p.url && !p.url.includes('{') && p.url.trim() !== '');

    if (!photos.length) return;

    const section = document.getElementById('gallerySection');
    const grid    = document.getElementById('galleryGrid');
    if (!section || !grid) return;

    grid.innerHTML = '';
    photos.forEach(p => {
        const card = document.createElement('div');
        card.className = 'gallery-card';
        const label = p.label && !p.label.includes('{') ? p.label : '';
        card.innerHTML = `
            <div class="gallery-img-wrap">
                <img src="${p.url}" alt="${label}" loading="lazy" />
            </div>
            ${label ? `<p class="gallery-label">${label}</p>` : ''}
        `;
        grid.appendChild(card);
    });

    section.style.display = 'block';
}

// ============ INITIALIZE SPARKLES ============
function initSparkles() {
    const container = document.getElementById('sparkles');
    const positions = [
        {top: '10%', left: '5%'},
        {top: '20%', right: '8%'},
        {top: '40%', left: '3%'},
        {bottom: '15%', right: '10%'},
        {bottom: '25%', left: '8%'},
        {top: '60%', right: '5%'}
    ];

    positions.forEach((pos, idx) => {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle-overlay';
        sparkle.textContent = ['✦', '✧', '⭐'][idx % 3];

        Object.entries(pos).forEach(([key, val]) => {
            sparkle.style[key] = val;
        });

        sparkle.style.animationDelay = (idx * 0.3) + 's';
        container.appendChild(sparkle);
    });
}

// ============ MAIN INITIALIZATION ============
function init() {
    initializeCssVariables();
    createFloatingHearts();
    populateHeroSection();
    updateCountdown();
    renderBuilding();
    updateProgress();
    buildTimeline();
    initSparkles();
    initCouplePhoto();
    buildGallery();

    // Update countdown every second
    setInterval(updateCountdown, 1000);
}

// Run when DOM is loaded
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
} else {
    init();
}

// =====================
// STAGE PREVIEW PANEL
// =====================
function initStagePreview() {
    const stageNames = [
        'Khu đất trống', 'Nền móng', 'Bức tường',
        'Cột trụ', 'Cổng vòm', 'Mái ngói',
        'Cửa sổ', 'Khu vườn', 'Vườn hoa',
        'Đài phun', 'Lễ đường ✨'
    ];

    const panel = document.createElement('div');
    panel.id = 'stagePreviewPanel';
    panel.innerHTML = `
        <button id="stagePanelToggle" title="Xem trước từng giai đoạn">
            <span style="font-size:1.1rem">🏛</span>
            <span style="font-size:0.7rem;display:block;margin-top:2px;letter-spacing:.05em">Stage</span>
        </button>
        <div id="stagePanelContent">
            <div style="font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;color:#a07880;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(0,0,0,.06)">
                Xem trước giai đoạn
            </div>
            <div id="stageButtons" style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px"></div>
            <div id="stagePanelLabel" style="font-size:0.78rem;text-align:center;color:#6a4050;font-style:italic;min-height:1.4em"></div>
        </div>
    `;
    document.body.appendChild(panel);

    const style = document.createElement('style');
    style.textContent = `
        #stagePreviewPanel {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            font-family: "Trebuchet MS", sans-serif;
        }
        #stagePanelToggle {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--male, #4A90D9), var(--female, #E91E8C));
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,.18);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform .2s, box-shadow .2s;
            margin-left: auto;
        }
        #stagePanelToggle:hover { transform: scale(1.08); box-shadow: 0 6px 22px rgba(0,0,0,.22); }
        #stagePanelContent {
            display: none;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,.8);
            border-radius: 16px;
            padding: 14px;
            width: 220px;
            box-shadow: 0 8px 32px rgba(0,0,0,.12);
            margin-bottom: 10px;
            animation: panelSlideUp .2s ease;
        }
        #stagePanelContent.open { display: block; }
        @keyframes panelSlideUp {
            from { opacity:0; transform:translateY(10px) }
            to   { opacity:1; transform:translateY(0) }
        }
        .stage-btn {
            padding: 5px 2px;
            border: 1px solid rgba(0,0,0,.1);
            border-radius: 8px;
            background: #f9f0f5;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
            color: #6a4050;
            text-align: center;
        }
        .stage-btn:hover { background: #ffe0ec; border-color: var(--female,#E91E8C); }
        .stage-btn.active {
            background: linear-gradient(135deg, var(--male,#4A90D9), var(--female,#E91E8C));
            color: white;
            border-color: transparent;
            box-shadow: 0 2px 8px rgba(0,0,0,.15);
        }
    `;
    document.head.appendChild(style);

    // Build stage buttons
    const stageButtons = document.getElementById('stageButtons');
    for (let i = 0; i <= 10; i++) {
        const btn = document.createElement('button');
        btn.className = 'stage-btn' + (i === Math.min(window.TEMPLATE_CONFIG.milestoneCount, 10) ? ' active' : '');
        btn.textContent = i === 10 ? '10 ✨' : String(i);
        btn.dataset.stage = String(i);
        btn.addEventListener('click', () => setPreviewStage(i));
        stageButtons.appendChild(btn);
    }

    // Toggle panel
    document.getElementById('stagePanelToggle').addEventListener('click', () => {
        document.getElementById('stagePanelContent').classList.toggle('open');
    });

    // Set initial label
    updateStageLabel(Math.min(window.TEMPLATE_CONFIG.milestoneCount, 10));
}

function setPreviewStage(stage) {
    // Update config
    window.TEMPLATE_CONFIG.milestoneCount = stage;
    // Re-render building + progress
    renderBuilding();
    updateProgress();
    // Update active button
    document.querySelectorAll('.stage-btn').forEach(btn => {
        btn.classList.toggle('active', Number(btn.dataset.stage) === stage);
    });
    updateStageLabel(stage);
    // Scroll building into view
    document.querySelector('.hall-section')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function updateStageLabel(stage) {
    const names = [
        'Khu đất trống 🌱','Nền móng đá ⬜','Tường xây cao 🧱',
        'Cột trụ Hy Lạp 🏛','Cổng vòm lớn 🚪','Mái ngói + đỉnh vàng 🏠',
        'Cửa sổ phát sáng 🌟','Khu vườn cây xanh 🌿','Vườn hoa nở 🌸',
        'Đài phun nước 💧','Lễ đường hoàn thành ✨'
    ];
    const el = document.getElementById('stagePanelLabel');
    if (el) el.textContent = names[stage] || '';
}

initStagePreview();
</script>
